<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Morning.</title>
    <link rel="stylesheet" href="../vid/vid.css">
    <style>
        #loop {
            font-family: omori;
            color: white;
            font-size: 3em;
            opacity: 1;
            display: none;
            transition: opacity 0.6s ease;
            z-index: 3;
            position: absolute;
            text-align: center;
            width: 100vw;
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="container">
        <video autoplay name="media">
            <source src="../vid/good_morning.webm" type="video/webm">
        </video>
    </div>
    <h1 id="loop">Loop mode activated!</h1>
    <script>
        const video = document.querySelector("video");
        const loopcode = "loop";
        let counter = 0;
        setInterval(() => {
            console.log(counter);
        }, 100);
        document.addEventListener("keydown", (e) => {
            if (e.key === "l" && counter === 0) {
                counter++;
            } else if (e.key === "o" && counter === 1) {
                counter++;
            } else if (e.key === "o" && counter === 2) {
                counter++;
            } else if (e.key === "p" && counter === 3) {
                video.loop = true;
                msg();
                counter++;
            } else {
                counter = 0;
            }
        });
        function msg() {
            let loopmsg = document.getElementById("loop");
            loopmsg.style.display = "block";
            setTimeout(() => {
                loopmsg.style.opacity = 0;
            }, 300);
        }
    </script>
</body>
</html>
