<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <title>Dark Place.</title>
    <style>
        body{
            background-color: black;
        }
        body::-webkit-scrollbar{
            display: none;
        }
        #light1{
            position: absolute;
            z-index: 2;
            display: block;
            width: 100%;
            height: auto;
            pointer-events: none;
            opacity: 0;
            transition: opacity 4s ease;
            visibility: hidden;
        }
        #light2{
            position: absolute;
            z-index: 1;
            display: block;
            width: 100%;
            height: auto;
            pointer-events: none;
            opacity: 0;
            transition: opacity 6s ease;
            visibility: hidden;
        }
    </style>
</head>
<body>
    <audio src="darkplace.m4a" autoplay loop></audio>
    <img src="light1.png" alt="" id="light1">
    <img src="light2.png" alt="" id="light2">
    <script>
        let light1 = document.getElementById("light1");
        let light2 = document.getElementById("light2");
        let mouseX = 0;
        let mouseY = 0;
        let x1 = 0, y1 = 0;
        let x2 = 0, y2 = 0;
        let yeslight = false;
        
        setTimeout(() => {
            light();
            light1.style.visibility = "visible";
            light2.style.visibility = "visible";
            light1.style.opacity = 1;
            light2.style.opacity = 1;
        }, 60000)

        document.addEventListener("mousemove", (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        function light() {
            const offsetX = light1.offsetWidth / 2;
            const offsetY = light1.offsetHeight / 2;

            x1 = mouseX - offsetX;
            y1 = mouseY - offsetY;

            x2 += (mouseX - offsetX - x2) * 0.4;
            y2 += (mouseY - offsetY - y2) * 0.4;

            light1.style.transform = `translate(${x1}px, ${y1}px)`;
            light2.style.transform = `translate(${x2}px, ${y2}px)`;

            requestAnimationFrame(light);
        }
    </script>
</body>
</html>
