<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome To Black Space</title>
    <link rel="icon" href="../icons/blackspace.png">
    <style>
        body{
            text-align: center;
            justify-content: center;
            align-items: center;
            display: flex;
            height: 98vh;
            background-color: black;
        }
        img{
            pointer-events: none;
            user-select: none;
            width: 100%;
            opacity: 0;
            transition: opacity 3s ease-in-out;
            image-rendering: pixelated;
        }
        #space{
            opacity: 0;
            /* transition: opacity 8s ease-in-out; */
            animation: fadeIn 5s forwards;
            width: 100%;
            max-width: 800px;
            display: block;
            height: auto;
        }
        @keyframes fadeIn {
            to{
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <audio src="welcomeagain.m4a" autoplay loop></audio>
    <div id="space">
        <img id="img" src="../img/BLACK_SPACE.png" alt="BLACK_SPACE">
    </div>
    <script>
        boom();
        function boom() {
            document.getElementById("img").style.opacity = 1;
        }
    </script>
</body>
</html>
