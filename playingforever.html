<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0", user-scalable="no">
    <link rel="icon" href="icons/playingforever.png">
    <title>Playing Forever.</title>
    <style>
        body{
            background: no-repeat linear-gradient(180deg,rgba(175, 138, 232, 1) 0%, rgba(155, 110, 226, 1) 48%, rgba(128, 70, 218, 1) 71%, rgba(87, 11, 206, 1) 100%);
            background-size: 100% 100%;
            background-attachment: fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;

        }
        h1{
            font-family: omori;
            text-align: center;
            color: #FFFFFF;
            user-select: none;
            display: block;
            position: relative;
            transition: all;
            margin-bottom: 650px;
        }
        #container{
            transition: opacity 6s ease;
            position: relative;
            width: 100%;
            height: 98vh;
            max-width: 800px;
            opacity: 0;
            /*background: url("sleepover.png") no-repeat center;
            background-size: contain; */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #frame{
            position: absolute;
            width: 100%;
            height: auto;
            display: block;
            /* padding-bottom: 10%; */
            z-index: 2;
        }
        #sleepover{
            position: absolute;
            /* margin-top: 10px; */
            width: 100%;
            z-index: 1;
            image-rendering: pixelated;
        }
        #bg2{
            background-color: #570BCE;
        }
        @font-face {
            font-family: omori;
            src: url("OMORI_GAME2.ttf");
        }
    </style>
</head>
<body>
    <audio src="playingforever.m4a" autoplay loop></audio>
    <div id="container">
        <h1 id="txt">She loved you and you killed her</h1>
        <img src="sleepover.png" alt="" id="sleepover">
        <img src="sleepover_frame.png" alt="" id="frame">
    </div>
    <script src="pf.js"></script>
</body>
</html>
